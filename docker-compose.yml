version: "3.8"

services:
  # ---- 后端 API 代理 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: agushare-backend:latest
    container_name: agushare-backend
    # Rootless Podman：使用 5000 非特权端口
    volumes:
      - stock_data:/data
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - CACHE_SECONDS=5
    # 极低资源限制
    cpus: "0.3"
    memory: "128M"
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- 前端 Web 服务 ----
  nginx:
    image: nginx:alpine-slim
    container_name: agushare-nginx
    # 映射到 8080 而非 80（Podman Rootless 无法绑定 <1024 端口）
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro,Z
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,Z
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    cpus: "0.2"
    memory: "64M"

volumes:
  stock_data:
