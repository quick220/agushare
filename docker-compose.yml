version: "3.8"

services:
  # ---- 前端 Web 服务 ----
  nginx:
    image: nginx:alpine-slim
    container_name: agushare-nginx
    network_mode: host
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro,Z
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    cpus: "0.2"
    memory: "64M"

# 注意：后端 (FastAPI) 当前通过宿主机 systemd 运行（端口 5000）
# 如需容器化后端，取消下方注释并注释上面 volumes 中的 :Z 标志
# backend:
#   build:
#     context: ./backend
#     dockerfile: Dockerfile
#   image: agushare-backend:latest
#   container_name: agushare-backend
#   network_mode: host
#   restart: unless-stopped
#   environment:
#     - TZ=Asia/Shanghai
#   cpus: "0.3"
#   memory: "128M"
