version: "3.8"

services:
  # ---- 后端 API 代理 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: agushare-backend:latest
    container_name: agushare-backend
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - CACHE_SECONDS=5
    volumes:
      - stock_data:/data
    cpus: "0.3"
    memory: "128M"
    healthcheck:
      test: ["CMD", "pidof", "uvicorn"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---- 前端 Web 服务 ----
  nginx:
    image: nginx:alpine-slim
    container_name: agushare-nginx
    network_mode: host
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro,Z
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    cpus: "0.2"
    memory: "64M"

volumes:
  stock_data:
