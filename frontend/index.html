<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股大屏 - 实时行情看板</title>
<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="dashboard">

    <!-- 标题栏 -->
    <div class="header">
        <div class="header-title">
            <h1>📈 A股大屏</h1>
            <span class="subtitle">REAL-TIME MARKET</span>
        </div>
        <div class="market-status">
            <span id="market-status-dot" class="status-dot closed"></span>
            <span id="market-status-text" style="font-size:0.9em;letter-spacing:1px;">加载中...</span>
            <span style="margin-left:16px;color:#4a5580;">|</span>
            <span class="update-time">更新 <span id="update-time">--:--:--</span></span>
            <button class="btn-manage" onclick="openManageModal()" title="管理自选股">⚙️</button>
        </div>
    </div>

    <!-- 三大指数 -->
    <div class="indices-row">
        <div class="index-card" id="index-1">
            <div class="index-info">
                <div class="index-name">上证指数</div>
                <div class="index-price even-text">--</div>
            </div>
            <div class="index-change">
                <div class="index-pct even-text">--</div>
                <div class="index-amount">加载中...</div>
            </div>
        </div>
        <div class="index-card" id="index-2">
            <div class="index-info">
                <div class="index-name">深证成指</div>
                <div class="index-price even-text">--</div>
            </div>
            <div class="index-change">
                <div class="index-pct even-text">--</div>
                <div class="index-amount">加载中...</div>
            </div>
        </div>
        <div class="index-card" id="index-3">
            <div class="index-info">
                <div class="index-name">创业板指</div>
                <div class="index-price even-text">--</div>
            </div>
            <div class="index-change">
                <div class="index-pct even-text">--</div>
                <div class="index-amount">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main-content">
        <!-- 左侧：自选股列表 -->
        <div class="panel">
            <div class="panel-title">
                自选股行情
                <span class="stock-count" id="stock-count">--</span>
            </div>
            <div class="stock-table">
                <div class="table-header">
                    <span>名称</span>
                    <span style="text-align:right;">现价</span>
                    <span style="text-align:right;">涨跌幅</span>
                    <span style="text-align:right;">换手率</span>
                </div>
                <div class="table-body" id="stock-list"></div>
            </div>
        </div>

        <!-- 右侧：图表 -->
        <div class="panel">
            <div class="panel-title">市场分析</div>
            <div class="chart-container">
                <div class="chart-box" id="timeline-chart"></div>
                <div class="chart-box" id="pie-chart"></div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        A股大屏 · 数据来源：新浪财经 · 每 5 秒自动刷新 · 仅供个人参考
    </div>

</div>

<!-- ─── 自选股管理弹窗 ─── -->
<div id="manage-modal" class="modal-overlay" onclick="closeManageModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>📋 管理自选股</h2>
            <button class="modal-close" onclick="closeManageModal()">&times;</button>
        </div>

        <!-- 添加新股票 -->
        <div class="modal-section">
            <h3>添加股票</h3>
            <div class="add-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>交易所</label>
                        <select id="add-exchange">
                            <option value="sh">上海 (sh)</option>
                            <option value="sz">深圳 (sz)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>股票代码（6位）</label>
                        <input type="text" id="add-code" placeholder="例如 600519" maxlength="6">
                    </div>
                    <div class="form-group">
                        <label>股票名称</label>
                        <input type="text" id="add-name" placeholder="例如 贵州茅台">
                    </div>
                    <button class="btn-add" onclick="addStock()">➕ 添加</button>
                </div>
                <p class="form-hint">提示：代码不含 sh/sz 前缀，系统自动补全</p>
            </div>
        </div>

        <!-- 已有自选股列表 -->
        <div class="modal-section">
            <h3>已添加 (<span id="manage-count">0</span>)</h3>
            <div class="manage-list" id="manage-list"></div>
        </div>

        <div class="modal-footer">
            <span class="add-result" id="add-result"></span>
            <button class="btn-done" onclick="closeManageModal()">完成</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
